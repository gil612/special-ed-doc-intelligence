name = "special-ed-doc-intelligence"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[assets]
binding = "ASSETS"
directory = ".open-next/assets"

[[r2_buckets]]
binding = "DOCS_BUCKET"
bucket_name = "special-ed-documents"

[vars]
