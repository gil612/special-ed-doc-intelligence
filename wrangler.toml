name = "special-ed-doc-intelligence"
main = "worker-entry.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Safety net for lib/sweep-stale-processing.ts: waitUntil() only extends
# background execution ~30s past the response before Cloudflare kills the
# isolate outright, which can leave a document stuck at "processing"
# forever with no visible error. This sweep runs every 2 minutes and marks
# anything stuck past that threshold as "failed" instead.
[triggers]
crons = ["*/2 * * * *"]

[assets]
binding = "ASSETS"
directory = ".open-next/assets"

[[r2_buckets]]
binding = "DOCS_BUCKET"
bucket_name = "special-ed-documents"

[vars]
# Not sensitive - Supabase project URLs are safe to expose (often used
# client-side). The real secret is SUPABASE_SERVICE_ROLE_KEY, set as a
# dashboard secret, not here.
SUPABASE_URL = "https://fxkewejsbkcqnhzqwxfd.supabase.co"
